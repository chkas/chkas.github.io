<title>pentagram</title>

<style>
body{ background-color:#000; color:#ccc;}
.lnk {
	cursor: pointer;
	text-decoration: underline;
	display:inline;
}
canvas {
	width:calc(100vh - 64px);
	height:calc(100vh - 64px);
	max-width:calc(100vw - 16px);
	max-height:calc(100vw - 16px);
	display:block;
	margin:auto;
	outline:none;
}
a {color:#888}

</style>

<b>pentagram</b> - 
<small>
	<div id=edit class=lnk>Code</div> - <div id=install class=lnk>Install</div>
	- <a href=.>More samples</a>
</small>
<p>
<canvas></canvas>

<script>
edit.onclick = function() {
	window.open('../ide/?code=' + encodeURIComponent(easyscript))
}
install.onclick = function() {
	window.open('../run/?code=' + encodeURIComponent(easyscript))
}

easyscript = `xp = 10
yp = 40
set_linewidth 2
move_pen xp yp
while angle > -720
  x = xp + cos angle * 80
  y = yp + sin -angle * 80
  draw_line x y
  f[] &= x
  f[] &= y
  xp = x
  yp = y
  angle -= 144
.
set_color 900
draw_polygon f[]

`
</script>
<script src=easy.js></script>
