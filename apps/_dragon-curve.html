<p>
<canvas></canvas>

<script>
edit.onclick = function() {
	window.open('../ide/?code=' + encodeURIComponent(easyscript))
}
install.onclick = function() {
	window.open('../run/?code=' + encodeURIComponent(easyscript))
}

easyscript = `set_color 050
set_linewidth 0.5
x = 25
y = 60
move_pen x y
angle = 0
# 
func dragon size lev d . .
  if lev = 0
    x -= cos angle * size
    y += sin angle * size
    draw_line x y
  else
    call dragon size / sqrt 2 lev - 1 1
    angle -= d * 90
    call dragon size / sqrt 2 lev - 1 -1
  .
.
call dragon 60 12 1

`
</script>
