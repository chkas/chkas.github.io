<b>brownian tree</b> - 
<small>
	<div id=edit class=lnk>Code</div> - <div id=install class=lnk>Install</div>
	- <a href=.>More samples</a>
</small>
<p>
<canvas></canvas>

<script>
edit.onclick = function() {
	window.open('../ide/?code=' + encodeURIComponent(easyscript))
}
install.onclick = function() {
	window.open('../run/?code=' + encodeURIComponent(easyscript))
}

easyscript = `# Brownian tree
#
set_rgb 0 1 1
len f[] 200 * 200
move_pen 50 50
draw_rect 0.5 0.5
f[100 * 200 + 100] = 1
n = 9000
while i < n
  repeat
    x = random 200
    y = random 200
    until f[y * 200 + x] <> 1
  .
  while 1 = 1
    xo = x
    yo = y
    x += random 3 - 1
    y += random 3 - 1
    if x < 0 or y < 0 or x >= 200 or y >= 200
      break 1
    .
    if f[y * 200 + x] = 1
      move_pen xo / 2 yo / 2
      draw_rect 0.5 0.5
      f[yo * 200 + xo] = 1
      i += 1
      if i mod 16 = 0
        set_rgb 0.2 + i / n 1 1
        sleep 0
      .
      break 1
    .
  .
.

`
</script>
<script src=easy.js></script>
