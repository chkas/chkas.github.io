	width:calc(100vh - 64px);

<b>Julia set</b> - 
<small>
	<div id=edit class=lnk>Code</div> - <div id=install class=lnk>Install</div>
	- <a href=.>More samples</a>
</small>
<p>
<canvas></canvas>

<script>
edit.onclick = function() {
	window.open('../ide/?code=' + encodeURIComponent(easyscript))
}
install.onclick = function() {
	window.open('../run/?code=' + encodeURIComponent(easyscript))
}

easyscript = `# Julia set
# 
cx = -0.7
cy = 0.27015
for y range 300
  for x range 300
    zx = (x - 150) / 100
    zy = (y - 150) / 150
    set_rgb 0 0 0
    for iter range 128
      if zx * zx + zy * zy > 4
        set_rgb iter / 16 0 0
        break 1
      .
      h = zx * zx - zy * zy + cx
      zy = 2 * zx * zy + cy
      zx = h
    .
    move_pen x / 3 y / 3
    draw_rect 0.4 0.4
  .
.

`
</script>
<script src=easy.js></script>
