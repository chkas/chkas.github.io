	width:calc(100vh - 64px);
	height:calc(100vh - 64px);

<b>Fractal tree</b> - 
<small>
	<div id=edit class=lnk>Code</div> - <div id=install class=lnk>Install</div>
	- <a href=.>More samples</a>
</small>
<p>
<canvas></canvas>

<script>
edit.onclick = function() {
	window.open('../ide/?code=' + encodeURIComponent(easyscript))
}
install.onclick = function() {
	window.open('../run/?code=' + encodeURIComponent(easyscript))
}

easyscript = `# Fractal tree
#
func tree x y deg n . .
  if n > 0
    set_linewidth n * 0.4
    move_pen x y
    x += cos deg * n * 1.3 * (randomf + 0.5)
    y += sin deg * n * 1.3 * (randomf + 0.5)
    draw_line x y
    call tree x y deg - 20 n - 1
    call tree x y deg + 20 n - 1
  .
.
call tree 50 90 -90 10
on mouse_down
  clear_screen
  call tree 50 90 -90 10
.

`
</script>
<script src=easy.js></script>
