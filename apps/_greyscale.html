<canvas></canvas>

<script>
edit.onclick = function() {
	window.open('../ide/?code=' + encodeURIComponent(easyscript))
}
install.onclick = function() {
	window.open('../run/?code=' + encodeURIComponent(easyscript))
}

easyscript = `n = 8
for row range 4
  sz = 100 / n
  for i range n
    c = i / (n - 1)
    if row mod 2 = 1
      c = 1 - c
    .
    set_rgb c c c
    move_pen sz * i row * 25
    draw_rect sz + 1 25
  .
  n *= 2
.
`
</script>
